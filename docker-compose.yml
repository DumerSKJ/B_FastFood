services:
  app:
    build: .
    container_name: venta_comida_rapida_app
    ports:
      - "8083:80"
      - "9003:9003"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:17
    container_name: negocio_comida_rapida
    restart: always
    environment:
      POSTGRES_DB: negocio_comida_rapida
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password_secret
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./DataBase.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
